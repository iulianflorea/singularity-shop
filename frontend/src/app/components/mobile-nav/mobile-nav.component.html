<nav class="mobile-nav">
  <a class="mobile-nav__item" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>{{ ts.t('nav.home') }}</span>
  </a>

  <a class="mobile-nav__item" routerLink="/products" routerLinkActive="active">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>{{ ts.t('nav.products') }}</span>
  </a>

  <a class="mobile-nav__item mobile-nav__cart" routerLink="/cart" routerLinkActive="active">
    <div class="cart-icon-wrap">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      @if (cart.itemCount() > 0) {
        <span class="cart-badge">{{ cart.itemCount() }}</span>
      }
    </div>
    <span>{{ ts.t('footer.cart') }}</span>
  </a>

  @if (auth.isLoggedIn()) {
    <a class="mobile-nav__item" routerLink="/orders" routerLinkActive="active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>{{ ts.t('nav.myOrders') }}</span>
    </a>
  } @else {
    <a class="mobile-nav__item" routerLink="/login" routerLinkActive="active">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>{{ ts.t('nav.login') }}</span>
    </a>
  }
</nav>
