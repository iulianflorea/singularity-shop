<nav class="navbar">
  <div class="navbar-inner container">
    <a routerLink="/home" class="navbar-logo">Singularity</a>

    <ul class="navbar-links">
      <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Acasă</a></li>
      <li><a routerLink="/products" routerLinkActive="active">Produse</a></li>
      @if (auth.isLoggedIn()) {
        <li><a routerLink="/orders" routerLinkActive="active">Comenzile mele</a></li>
      }
      @if (auth.isAdmin()) {
        <li><a routerLink="/admin" routerLinkActive="active">Admin</a></li>
      }
    </ul>

    <div class="navbar-actions">
      @if (auth.isLoggedIn()) {
        <button class="btn-secondary btn-sm" (click)="auth.logout()">Ieșire</button>
      } @else {
        <a routerLink="/login" class="btn-secondary btn-sm">Autentificare</a>
      }

      <a routerLink="/cart" class="cart-btn" aria-label="Coș">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        @if (cart.itemCount() > 0) {
          <span class="cart-badge">{{ cart.itemCount() }}</span>
        }
      </a>
    </div>
  </div>
</nav>
