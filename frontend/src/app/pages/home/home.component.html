<section class="hero">
  <div class="container hero-inner">
    <div class="hero-text">
      <h1 class="hero-headline" style="white-space:pre-line">{{ ts.t('hero.headline') }}</h1>
      <p class="hero-subtitle">{{ ts.t('hero.subtitle') }}</p>
      <a routerLink="/products" class="btn-primary hero-cta">{{ ts.t('hero.cta') }}</a>
    </div>
    <div class="hero-visual">
      <div class="hero-image-wrap">
        <img src="assets/hero.jpg" alt="Singularity Shop" onerror="this.style.display='none'">
        <div class="hero-placeholder"></div>
      </div>
    </div>
  </div>
</section>

<section class="featured">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">{{ ts.t('featured.title') }}</h2>
      <a routerLink="/products" class="section-link">{{ ts.t('featured.viewAll') }}</a>
    </div>

    @if (loading()) {
      <app-skeleton [count]="8" />
    } @else {
      <div class="product-grid">
        @for (product of featuredProducts(); track product.id) {
          <app-product-card [product]="product" />
        }
      </div>
    }
  </div>
</section>
