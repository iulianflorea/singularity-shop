<section class="hero">
  <div class="container hero-inner">
    <div class="hero-text">
      <h1 class="hero-headline">Calitate<br>fără compromis.</h1>
      <p class="hero-subtitle">Descoperă produse premium selectate cu grijă pentru tine.</p>
      <a routerLink="/products" class="btn-primary hero-cta">Explorează produsele</a>
    </div>
    <div class="hero-visual">
      <div class="hero-image-wrap">
        <img src="assets/hero.jpg" alt="Singularity Shop" onerror="this.style.display='none'">
        <div class="hero-placeholder"></div>
      </div>
    </div>
  </div>
</section>

<section class="featured">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Produse recomandate</h2>
      <a routerLink="/products" class="section-link">Vezi toate →</a>
    </div>

    @if (loading()) {
      <app-skeleton [count]="8" />
    } @else {
      <div class="product-grid">
        @for (product of featuredProducts(); track product.id) {
          <app-product-card [product]="product" />
        }
      </div>
    }
  </div>
</section>
