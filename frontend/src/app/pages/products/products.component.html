<div class="products-page">
  <div class="container">
    <div class="products-header">
      <h1 class="section-title">Toate produsele</h1>

      <div class="search-bar">
        <input
          class="input-field"
          type="text"
          placeholder="Caută produse..."
          [(ngModel)]="search"
          (keyup.enter)="onSearch()"
        >
        <button class="btn-primary search-btn" (click)="onSearch()">Caută</button>
      </div>
    </div>

    <div class="categories">
      @for (cat of categories; track cat) {
        <button
          class="category-chip"
          [class.active]="selectedCategory === cat"
          (click)="selectCategory(cat)">
          {{ cat }}
        </button>
      }
    </div>

    @if (loading()) {
      <app-skeleton [count]="12" />
    } @else if (products().length === 0) {
      <app-empty-state
        icon="🔍"
        title="Niciun produs găsit"
        message="Încearcă alte cuvinte cheie sau resetează filtrele."
      />
    } @else {
      <div class="product-grid">
        @for (product of products(); track product.id) {
          <app-product-card [product]="product" />
        }
      </div>

      @if (totalPages() > 1) {
        <div class="pagination">
          @for (page of pages; track page) {
            <button
              class="page-btn"
              [class.active]="currentPage() === page"
              (click)="goToPage(page)">
              {{ page + 1 }}
            </button>
          }
        </div>
      }
    }
  </div>
</div>
